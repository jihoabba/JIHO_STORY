<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동화책 메이커</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); min-height: 100vh; }

#app { max-width: 560px; margin: 0 auto; padding: 12px 12px 80px; }

/* Header */
.header { text-align: center; padding: 20px 0 16px; position: relative; }
.header-title { font-size: 26px; font-weight: 800; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.header-subtitle { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 4px; }
.header-btns { position: absolute; top: 20px; right: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.header-left-btns { position: absolute; top: 20px; left: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.icon-btn { background: rgba(255,255,255,0.25); border: none; border-radius: 12px; padding: 8px 10px; cursor: pointer; font-size: 20px; color: #fff; backdrop-filter: blur(8px); transition: all 0.2s; display: flex; flex-direction: column; align-items: center; }
.icon-btn:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }
.icon-btn-label { font-size: 9px; margin-top: 2px; font-weight: 700; }

/* Cards */
.card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

/* Section labels */
.section-label { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

/* Character selector */
.char-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 8px; scrollbar-width: thin; }
.char-scroll::-webkit-scrollbar { height: 4px; }
.char-scroll::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 2px; }
.char-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
.char-card { width: 90px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; padding: 10px 6px; border-radius: 14px; border: 2px solid transparent; transition: all 0.2s; background: #f9f9f9; }
.char-card:hover { background: #fff0f5; border-color: #ffb3d1; }
.char-card.selected { border-color: #ff6bae; box-shadow: 0 0 0 3px rgba(255,107,174,0.2); background: #fff0f5; }
.char-photo { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; }
.char-emoji { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #ffecd2, #fcb69f); display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid #eee; }
.char-name { font-size: 12px; font-weight: 700; color: #444; text-align: center; word-break: break-all; }
.char-empty { text-align: center; padding: 20px; color: #aaa; font-size: 13px; }
.char-empty-btn { margin-top: 8px; background: #ff6bae; color: #fff; border: none; border-radius: 10px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }

/* Textarea */
textarea { width: 100%; border: 2px solid #eee; border-radius: 12px; padding: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; resize: vertical; min-height: 100px; outline: none; transition: border-color 0.2s; }
textarea:focus { border-color: #ff6bae; }

/* Buttons */
.btn-primary { background: linear-gradient(135deg, #ff6bae, #a855f7); color: #fff; border: none; border-radius: 14px; padding: 14px 28px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; font-family: inherit; transition: all 0.2s; box-shadow: 0 4px 16px rgba(168,85,247,0.3); }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168,85,247,0.4); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary { background: #f0f0f0; color: #555; border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.btn-secondary:hover { background: #e0e0e0; }
.btn-danger { background: #fee; color: #e44; border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-danger:hover { background: #fdd; }

/* Error */
.error-msg { background: #fee; border: 1px solid #fcc; border-radius: 10px; padding: 10px 14px; color: #c00; font-size: 13px; margin-bottom: 12px; }

/* Loading */
.loading-card { background: #fff; border-radius: 20px; padding: 40px 20px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
.spinner { width: 60px; height: 60px; border: 5px solid #f0f0f0; border-top-color: #ff6bae; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 18px; font-weight: 700; color: #444; margin-bottom: 8px; }
.loading-sub { font-size: 13px; color: #888; }

/* Review */
.story-title-card { background: linear-gradient(135deg, #ff6bae, #a855f7); border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(168,85,247,0.3); }
.story-title-text { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; }
.story-char-name { font-size: 14px; color: rgba(255,255,255,0.85); }

.page-card { background: #fff; border-radius: 20px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.page-text-area { padding: 16px 20px; }
.page-num { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.page-text { font-family: 'Nanum Myeongjo', serif; font-size: 15px; line-height: 1.7; color: #333; }
.page-illus-label { font-size: 11px; color: #bbb; margin-top: 10px; }
.page-illus-text { font-size: 12px; color: #999; font-style: italic; line-height: 1.5; }
.page-img-area { background: #f8f8f8; min-height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
.page-img-area img { width: 100%; display: block; }
.page-img-placeholder { text-align: center; padding: 30px; color: #ccc; }
.page-img-placeholder .emoji { font-size: 48px; display: block; margin-bottom: 8px; }
.page-img-loading { position: absolute; inset: 0; background: rgba(255,255,255,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.page-img-loading .mini-spinner { width: 36px; height: 36px; border: 3px solid #f0f0f0; border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; }

.progress-banner { background: linear-gradient(135deg, #e8f4ff, #f3e8ff); border-radius: 14px; padding: 14px 18px; margin-bottom: 16px; }
.progress-bar-wrap { background: #e0e0e0; border-radius: 99px; height: 8px; overflow: hidden; margin-top: 8px; }
.progress-bar { background: linear-gradient(90deg, #ff6bae, #a855f7); height: 8px; border-radius: 99px; transition: width 0.4s; }
.progress-text { font-size: 13px; color: #666; font-weight: 600; }

.feedback-card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-bottom: 16px; }
.feedback-label { font-size: 14px; font-weight: 700; color: #444; margin-bottom: 8px; }
.feedback-btns { display: flex; gap: 10px; margin-top: 12px; }
.feedback-btns button { flex: 1; }

.pdf-btn { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #fff; border: none; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; font-family: inherit; transition: all 0.2s; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(67,233,123,0.3); }
.pdf-btn:hover { transform: translateY(-2px); }

/* Settings Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.hidden { display: none; }
.modal-card { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 18px; font-weight: 800; color: #333; }
.modal-close { background: #f0f0f0; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.tab-bar { display: flex; gap: 4px; padding: 12px 16px 0; border-bottom: 1px solid #f0f0f0; }
.tab-btn { flex: 1; background: none; border: none; border-bottom: 3px solid transparent; padding: 10px 4px; font-size: 13px; font-weight: 700; color: #aaa; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.tab-btn.active { color: #ff6bae; border-bottom-color: #ff6bae; }
.modal-body { flex: 1; overflow-y: auto; padding: 16px; }

/* API tab */
.api-status-row { display: flex; gap: 12px; margin-bottom: 16px; }
.api-badge { flex: 1; background: #f8f8f8; border-radius: 12px; padding: 12px; text-align: center; }
.api-badge-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.api-badge-status { font-size: 13px; font-weight: 700; }
.status-set { color: #22c55e; }
.status-unset { color: #ef4444; }

.accordion-trigger { background: linear-gradient(135deg, #ff6bae, #a855f7); color: #fff; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; font-family: inherit; margin-bottom: 12px; }
.accordion-body { display: none; }
.accordion-body.open { display: block; }
.form-group { margin-bottom: 12px; }
.form-label { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; display: block; }
.form-input { width: 100%; border: 2px solid #eee; border-radius: 10px; padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
.form-input:focus { border-color: #ff6bae; }
.btn-save { background: #ff6bae; color: #fff; border: none; border-radius: 10px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%; }

/* Characters tab */
.char-list { display: flex; flex-direction: column; gap: 12px; }
.char-list-card { display: flex; gap: 12px; align-items: center; background: #f9f9f9; border-radius: 14px; padding: 12px; }
.char-list-photo { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.char-list-emoji { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #ffecd2, #fcb69f); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.char-list-info { flex: 1; min-width: 0; }
.char-list-name { font-size: 14px; font-weight: 700; color: #333; }
.char-list-desc { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-list-actions { display: flex; gap: 6px; flex-shrink: 0; }
.char-list-actions button { padding: 6px 10px; font-size: 12px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; }
.btn-edit { background: #e8f4ff; color: #3b82f6; }
.btn-delete { background: #fee; color: #e44; }
.btn-add-char { background: linear-gradient(135deg, #ff6bae, #a855f7); color: #fff; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 14px; font-family: inherit; }

/* Char form */
.char-form { display: none; }
.char-form.open { display: block; }
.photo-upload-area { border: 2px dashed #e0e0e0; border-radius: 14px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
.photo-upload-area:hover { border-color: #ff6bae; background: #fff0f5; }
.photo-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin: 0 auto 8px; display: block; }
.photo-upload-hint { font-size: 13px; color: #aaa; }

/* Style tab */
.style-slots { display: flex; gap: 12px; }
.style-slot { flex: 1; }
.style-slot-box { border: 2px dashed #e0e0e0; border-radius: 14px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; transition: all 0.2s; background: #f8f8f8; }
.style-slot-box:hover { border-color: #ff6bae; background: #fff0f5; }
.style-slot-box img { width: 100%; height: 100%; object-fit: cover; }
.style-slot-empty { text-align: center; color: #ccc; font-size: 13px; }
.style-slot-empty .plus { font-size: 32px; display: block; }
.style-remove { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.style-analyzing { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #666; }

/* Library */
#library-view { display: none; }
#library-view.active { display: block; }
#main-view.hidden { display: none; }
.library-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-top: 16px; }
.back-btn { background: rgba(255,255,255,0.25); border: none; border-radius: 12px; padding: 8px 14px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; backdrop-filter: blur(8px); }
.library-title { font-size: 20px; font-weight: 800; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.library-card { background: #fff; border-radius: 16px; padding: 14px; display: flex; gap: 14px; align-items: flex-start; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-bottom: 12px; }
.library-thumb { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
.library-thumb-emoji { width: 80px; height: 80px; border-radius: 12px; background: linear-gradient(135deg, #ffecd2, #fcb69f); display: flex; align-items: center; justify-content: center; font-size: 40px; flex-shrink: 0; }
.library-info { flex: 1; min-width: 0; }
.library-story-title { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 4px; }
.library-meta { font-size: 12px; color: #888; margin-bottom: 8px; }
.library-actions { display: flex; gap: 8px; }
.library-actions button { padding: 6px 12px; font-size: 12px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; }
.library-empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.7); }
.library-empty .emoji { font-size: 60px; margin-bottom: 16px; }
.library-empty p { font-size: 16px; }

/* Toast */
#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(30,30,30,0.92); color: #fff; padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 600; z-index: 9999; pointer-events: none; opacity: 0; transition: all 0.3s; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* PDF render */
#pdf-render { position: fixed; left: -9999px; top: 0; pointer-events: none; }
.pdf-page { width: 840px; height: 420px; display: flex; overflow: hidden; }
.pdf-cover { width: 840px; height: 420px; background: linear-gradient(135deg, #ff6bae 0%, #a855f7 50%, #667eea 100%); display: flex; }
.pdf-cover-left { width: 420px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 30px; }
.pdf-cover-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid rgba(255,255,255,0.5); }
.pdf-cover-emoji-big { font-size: 80px; }
.pdf-cover-title { font-size: 28px; font-weight: 800; color: #fff; text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,0.2); font-family: 'Nanum Myeongjo', serif; }
.pdf-cover-for { font-size: 16px; color: rgba(255,255,255,0.85); text-align: center; }
.pdf-cover-right { width: 420px; display: flex; align-items: center; justify-content: center; font-size: 120px; }
.pdf-left { width: 420px; height: 420px; padding: 36px 32px; display: flex; flex-direction: column; justify-content: center; position: relative; }
.pdf-page-badge { position: absolute; top: 20px; right: 20px; width: 30px; height: 30px; border-radius: 50%; background: rgba(0,0,0,0.12); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: rgba(0,0,0,0.5); }
.pdf-page-label { font-size: 10px; font-weight: 700; color: rgba(0,0,0,0.3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
.pdf-page-text { font-family: 'Nanum Myeongjo', serif; font-size: 16px; line-height: 1.8; color: #333; }
.pdf-right { width: 420px; height: 420px; overflow: hidden; }
.pdf-right img { width: 100%; height: 100%; object-fit: cover; }
.pdf-right-placeholder { width: 100%; height: 100%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 60px; }

/* Misc */
.hidden { display: none !important; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.mt16 { margin-top: 16px; }

.analyzing-overlay { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: #888; padding: 8px; }
.mini-spin { width: 14px; height: 14px; border: 2px solid #eee; border-top-color: #ff6bae; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
</style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- PDF Render Area (off-screen) -->
<div id="pdf-render"></div>

<!-- Settings Modal -->
<div class="modal-overlay hidden" id="settings-modal">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title">⚙️ 설정</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-api-btn" onclick="switchSettingsTab('api')">🔑 API 키</button>
      <button class="tab-btn" id="tab-chars-btn" onclick="switchSettingsTab('chars')">👤 등장인물</button>
      <button class="tab-btn" id="tab-style-btn" onclick="switchSettingsTab('style')">🎨 스타일</button>
    </div>
    <div class="modal-body">
      <!-- API Tab -->
      <div id="tab-api" class="tab-content">
        <div class="api-status-row">
          <div class="api-badge">
            <div class="api-badge-label">Anthropic</div>
            <div class="api-badge-status" id="anthropic-status">미설정</div>
          </div>
          <div class="api-badge">
            <div class="api-badge-label">OpenAI</div>
            <div class="api-badge-status" id="openai-status">미설정</div>
          </div>
        </div>
        <button class="accordion-trigger" onclick="toggleApiInputs()">🔑 API 입력하기</button>
        <div class="accordion-body" id="api-accordion">
          <div class="form-group">
            <label class="form-label">Anthropic API Key</label>
            <input type="password" class="form-input" id="anthropic-key-input" placeholder="sk-ant-...">
          </div>
          <div class="form-group">
            <label class="form-label">OpenAI API Key</label>
            <input type="password" class="form-input" id="openai-key-input" placeholder="sk-...">
          </div>
          <button class="btn-save" onclick="saveApiKeys()">저장하기</button>
        </div>
      </div>
      <!-- Characters Tab -->
      <div id="tab-chars" class="tab-content hidden">
        <div id="char-list-section">
          <div class="char-list" id="char-list"></div>
          <button class="btn-add-char" onclick="showCharForm(null)">＋ 등장인물 추가</button>
        </div>
        <div class="char-form" id="char-form">
          <div class="photo-upload-area" onclick="triggerPhotoUpload()" id="photo-upload-area">
            <img class="photo-preview hidden" id="photo-preview" src="" alt="preview">
            <div id="photo-upload-hint">
              <span style="font-size:36px">📷</span>
              <p class="photo-upload-hint">사진을 클릭해서 업로드</p>
            </div>
          </div>
          <input type="file" id="photo-file-input" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
          <div class="form-group">
            <label class="form-label">이름</label>
            <input type="text" class="form-input" id="char-name-input" placeholder="등장인물 이름">
          </div>
          <div class="form-group">
            <label class="form-label">특징 / 설명</label>
            <textarea class="form-input" id="char-desc-input" placeholder="이 등장인물의 특징을 적어주세요" style="min-height:80px; resize:vertical;"></textarea>
          </div>
          <div id="vision-analyzing" class="analyzing-overlay hidden">
            <span class="mini-spin"></span> 사진 분석 중...
          </div>
          <div style="display:flex; gap:10px; margin-top:12px;">
            <button class="btn-secondary" style="flex:1" onclick="cancelCharForm()">취소</button>
            <button class="btn-primary" style="flex:2; padding:10px;" id="save-char-btn" onclick="saveCharacter()">저장</button>
          </div>
        </div>
      </div>
      <!-- Style Tab -->
      <div id="tab-style" class="tab-content hidden">
        <div class="section-label" style="margin-bottom:12px;">🖼️ 일러스트 스타일 레퍼런스 (선택)</div>
        <div class="style-slots" id="style-slots">

// ============================================================
// INDEXEDDB
// ============================================================
const DB_NAME = 'story_maker_db';
const DB_VERSION = 1;
let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('characters')) db.createObjectStore('characters', { keyPath: 'id', autoIncrement: true });
      if (!db.objectStoreNames.contains('style_refs')) db.createObjectStore('style_refs', { keyPath: 'id', autoIncrement: true });
      if (!db.objectStoreNames.contains('library')) db.createObjectStore('library', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = e => reject(e.target.error);
  });
}
function dbGetAll(store) {
  return openDB().then(db => new Promise((res, rej) => {
    const req = db.transaction(store,'readonly').objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}
function dbAdd(store, record) {
  return openDB().then(db => new Promise((res, rej) => {
    const req = db.transaction(store,'readwrite').objectStore(store).add(record);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}
function dbPut(store, record) {
  return openDB().then(db => new Promise((res, rej) => {
    const req = db.transaction(store,'readwrite').objectStore(store).put(record);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  }));
}
function dbDelete(store, id) {
  return openDB().then(db => new Promise((res, rej) => {
    const req = db.transaction(store,'readwrite').objectStore(store).delete(id);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  }));
}

// ============================================================
// UTILITIES
// ============================================================
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function resizeImage(dataUrl, maxPx = 512) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.naturalWidth, h = img.naturalHeight;
      const max = Math.max(w, h);
      if (max > maxPx) { const r = maxPx / max; w = Math.round(w*r); h = Math.round(h*r); }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.88));
    };
    img.src = dataUrl;
  });
}

function formatKoreanDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

// ============================================================
// GPT VISION
// ============================================================
async function analyzeImageWithVision(dataUrl, prompt) {
  const base64 = dataUrl.split(',')[1];
  const mimeType = dataUrl.split(';')[0].split(':')[1];
  const resp = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${getOpenAIKey()}`
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      max_tokens: 200,
      messages: [{
        role: "user",
        content: [
          { type: "image_url", image_url: { url: `data:${mimeType};base64,${base64}`, detail: "low" } },
          { type: "text", text: prompt }
        ]
      }]
    })
  });
  const data = await resp.json();
  return data.choices?.[0]?.message?.content?.trim() || '';
}

async function analyzeCharacterPhoto(dataUrl) {
  return analyzeImageWithVision(dataUrl,
    "Describe this person/character's visual appearance for children's book illustration in 2 sentences. Be specific about face shape, skin tone, hair color/style, eye color, distinctive features. Write in English only."
  );
}

async function analyzeStyleRef(dataUrl) {
  return analyzeImageWithVision(dataUrl,
    "Describe this illustration's art style in 1-2 sentences for use as a DALL-E style prompt. Focus on: art technique (watercolor/digital/etc), color palette, line quality, mood. English only."
  );
}

async function loadCharacters() {

function renderCharList() {

function renderCharSelector() {
  const area = document.getElementById('char-selector-area');
  const chars = appState.characters;
  if (chars.length === 0) {
    area.innerHTML = `<div class="char-empty">
      등장인물이 없어요. 설정에서 추가해주세요.
      <br><button class="char-empty-btn" onclick="openSettings('chars')">설정 열기</button>
    </div>`;
    return;
  }
  area.innerHTML = `<div class="char-scroll">${chars.map(c => {
    const selected = appState.selectedCharacter && appState.selectedCharacter.id === c.id;
    return `<div class="char-card ${selected ? 'selected' : ''}" onclick="selectCharacter(${c.id})">
      ${c.photoDataUrl
        ? `<img class="char-photo" src="${escHtml(c.photoDataUrl)}" alt="${escHtml(c.name)}">`
        : `<div class="char-emoji">👤</div>`}
      <div class="char-name">${escHtml(c.name)}</div>
    </div>`;
  }).join('')}</div>`;
  updateMakeBtn();
}

function selectCharacter(id) {
  appState.selectedCharacter = appState.characters.find(c => c.id === id) || null;
  renderCharSelector();
}

function showCharForm(id) {
  appState.editingCharacterId = id;
  appState.tempPhotoDataUrl = null;
  document.getElementById('char-list-section').style.display = 'none';
  const form = document.getElementById('char-form');
  form.classList.add('open');
  document.getElementById('photo-preview').classList.add('hidden');
  document.getElementById('photo-upload-hint').style.display = '';
  document.getElementById('vision-analyzing').classList.add('hidden');
  if (id) {
    const c = appState.characters.find(ch => ch.id === id);
    if (c) {
      document.getElementById('char-name-input').value = c.name;
      document.getElementById('char-desc-input').value = c.description;
      if (c.photoDataUrl) {
        appState.tempPhotoDataUrl = c.photoDataUrl;
        const prev = document.getElementById('photo-preview');
        prev.src = c.photoDataUrl;
        prev.classList.remove('hidden');
        document.getElementById('photo-upload-hint').style.display = 'none';
      }
    }
  } else {
    document.getElementById('char-name-input').value = '';
    document.getElementById('char-desc-input').value = '';
  }
}

function cancelCharForm() {
  document.getElementById('char-list-section').style.display = '';
  document.getElementById('char-form').classList.remove('open');
  appState.editingCharacterId = null;
  appState.tempPhotoDataUrl = null;
}

function triggerPhotoUpload() {
  document.getElementById('photo-file-input').click();
}

async function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const raw = await fileToDataUrl(file);
  const resized = await resizeImage(raw, 512);
  appState.tempPhotoDataUrl = resized;
  const prev = document.getElementById('photo-preview');
  prev.src = resized;
  prev.classList.remove('hidden');
  document.getElementById('photo-upload-hint').style.display = 'none';
  event.target.value = '';
}

async function saveCharacter() {
  const name = document.getElementById('char-name-input').value.trim();
  const desc = document.getElementById('char-desc-input').value.trim();
  if (!name) { showToast('이름을 입력해주세요'); return; }

  const btn = document.getElementById('save-char-btn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  let visualDescription = '';
  if (appState.tempPhotoDataUrl && getOpenAIKey()) {
    document.getElementById('vision-analyzing').classList.remove('hidden');
    try {
      visualDescription = await analyzeCharacterPhoto(appState.tempPhotoDataUrl);
    } catch(e) {
      console.error('Vision error:', e);
    }
    document.getElementById('vision-analyzing').classList.add('hidden');
  }

  const record = {
    name,
    description: desc,
    photoDataUrl: appState.tempPhotoDataUrl || null,
    visualDescription
  };

  try {
    if (appState.editingCharacterId) {
      record.id = appState.editingCharacterId;
      await dbPut('characters', record);
    } else {
      await dbAdd('characters', record);
    }
    await loadCharacters();
    renderCharList();
    cancelCharForm();
    showToast('저장됐어요 ✓');
  } catch(e) {
    showToast('저장 실패: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '저장';
}

async function deleteCharacter(id) {
  if (!confirm('정말 삭제할까요?')) return;
  await dbDelete('characters', id);
  if (appState.selectedCharacter && appState.selectedCharacter.id === id) {
    appState.selectedCharacter = null;
  }
  await loadCharacters();
  renderCharList();
}

function renderStyleSlots() {
  for (let slot = 0; slot < 3; slot++) {
    const existing = appState.styleRefs.find(r => r.slot === slot);
    const slotEl = document.getElementById(`style-slot-${slot}`);
    const box = slotEl.querySelector('.style-slot-box');
    if (existing && existing.imageDataUrl) {
      box.innerHTML = `
        <img src="${escHtml(existing.imageDataUrl)}" alt="style ${slot}">
        <button class="style-remove" onclick="removeStyleSlot(${slot}, event)">✕</button>
      `;
      box.onclick = null;
    } else {
      box.innerHTML = `<div class="style-slot-empty"><span class="plus">＋</span>추가</div>`;
      box.onclick = () => triggerStyleUpload(slot);
    }
  }
}

function triggerStyleUpload(slot) {
  document.getElementById(`style-file-${slot}`).click();
}

async function handleStyleUpload(slot, event) {
  const file = event.target.files[0];
  if (!file) return;
  const raw = await fileToDataUrl(file);
  const resized = await resizeImage(raw, 512);

  // Show analyzing overlay
  const slotEl = document.getElementById(`style-slot-${slot}`);
  const box = slotEl.querySelector('.style-slot-box');
  box.innerHTML = `<img src="${escHtml(resized)}" alt="style ${slot}"><div class="style-analyzing"><span class="mini-spin" style="width:14px;height:14px;border:2px solid #eee;border-top-color:#ff6bae;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;"></span> 분석중...</div>`;
  box.onclick = null;

  let styleDescription = '';
  if (getOpenAIKey()) {
    try {
      styleDescription = await analyzeStyleRef(resized);
    } catch(e) {
      console.error('Style vision error:', e);
    }
  }

  // Save to IndexedDB
  const existing = appState.styleRefs.find(r => r.slot === slot);
  const record = { slot, imageDataUrl: resized, styleDescription };
  if (existing) {
    record.id = existing.id;
    await dbPut('style_refs', record);
  } else {
    await dbAdd('style_refs', record);
  }
  await loadStyleRefs();
  renderStyleSlots();
  event.target.value = '';
}

async function removeStyleSlot(slot, e) {
  e.stopPropagation();
  const existing = appState.styleRefs.find(r => r.slot === slot);
  if (existing) {
    await dbDelete('style_refs', existing.id);
  }
  await loadStyleRefs();
  renderStyleSlots();
}

      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.content[0].text;
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('JSON 파싱 실패');
    appState.storyData = JSON.parse(match[0]);
    appState.imagesGenerated = false;
    setStep('review');
    renderReview();
  } catch(e) {
    console.error(e);
    setStep('input');
    const errEl = document.getElementById('input-error');
    errEl.textContent = '오류: ' + e.message;
    errEl.classList.remove('hidden');
  }
}

async function reviseStory() {
  if (!getAnthropicKey()) { openSettings('api'); return; }
  if (!appState.feedback.trim()) { showToast('수정 내용을 입력해주세요'); return; }

  setStep('loading');
  const char = appState.selectedCharacter;

  const systemPrompt = `당신은 아이들을 위한 동화 작가입니다. 기존 동화를 수정 요청에 맞게 수정해주세요.
동일한 JSON 형식으로만 응답하세요:
{
  "title": "동화 제목",
  "pages": [{"text": "내용", "illustration": "English illustration description"}]
}
삽화 설명은 반드시 영어로, 주인공 ${char.name}이 등장하는 장면으로 써주세요.`;

  const userPrompt = `기존 동화:
${JSON.stringify(appState.storyData, null, 2)}

수정 요청: ${appState.feedback}

위 수정 요청을 반영해서 동화를 수정해주세요.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getAnthropicKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.content[0].text;
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('JSON 파싱 실패');
    appState.storyData = JSON.parse(match[0]);
    appState.imagesGenerated = false;
    appState.feedback = '';
    setStep('review');
    renderReview();
  } catch(e) {
    console.error(e);
    setStep('review');
    showToast('수정 실패: ' + e.message);
  }
}

// ============================================================
// REVIEW RENDERING
// ============================================================
function setStep(step) {
  appState.step = step;
  document.getElementById('step-input').classList.toggle('hidden', step !== 'input');
  document.getElementById('step-loading').classList.toggle('hidden', step !== 'loading');
  document.getElementById('step-review').classList.toggle('hidden', step !== 'review');
}

function renderReview() {
  const story = appState.storyData;
  if (!story) return;
  const char = appState.selectedCharacter;
  document.getElementById('review-title').textContent = story.title || '';
  document.getElementById('review-char-name').textContent = char ? `주인공: ${char.name}` : '';
  document.getElementById('input-error').classList.add('hidden');
  document.getElementById('progress-banner').classList.add('hidden');
  document.getElementById('pdf-btn').classList.add('hidden');
  document.getElementById('feedback-input').value = '';
  appState.feedback = '';

  const pagesList = document.getElementById('pages-list');
  pagesList.innerHTML = story.pages.map((page, i) => {
    const color = PAGE_COLORS[i % PAGE_COLORS.length];
    const emoji = PAGE_EMOJIS[i % PAGE_EMOJIS.length];
    return `<div class="page-card" id="page-card-${i}">
      <div class="page-text-area" style="background:${color}; border-radius:20px 20px 0 0;">
        <div class="page-num">PAGE ${i+1}</div>
        <div class="page-text">${escHtml(page.text)}</div>
        <div class="page-illus-label">삽화 설명</div>
        <div class="page-illus-text">${escHtml(page.illustration)}</div>
      </div>
      <div class="page-img-area" id="page-img-${i}">
        <div class="page-img-placeholder">
          <span class="emoji">${emoji}</span>
          <div style="font-size:12px">그림이 여기에 표시돼요</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// IMAGE GENERATION (DALL-E 3)
// ============================================================
async function finishStory() {
  if (!getOpenAIKey()) {
    openSettings('api');
    showToast('OpenAI API 키가 필요해요');
    return;
  }
  const story = appState.storyData;
  const char = appState.selectedCharacter;
  if (!story || !char) return;

  const feedbackSection = document.getElementById('feedback-section');
  feedbackSection.style.display = 'none';

  const total = story.pages.length;
  let done = 0;

  const banner = document.getElementById('progress-banner');
  banner.classList.remove('hidden');
  updateProgress(done, total);

  // Show loading spinners on all pages
  story.pages.forEach((_, i) => {
    const imgArea = document.getElementById(`page-img-${i}`);
    imgArea.innerHTML = `<div class="page-img-loading"><div class="mini-spinner"></div><div style="font-size:12px;color:#888">생성 중...</div></div>`;
  });

  // Build style prompt suffix
  const styleRefs = appState.styleRefs.filter(r => r.styleDescription);
  const styleStr = styleRefs.length > 0
    ? `Illustration style: ${styleRefs.map(r => r.styleDescription).join(' ')} `
    : 'Soft pastel colors, gentle watercolor brushstrokes, cozy dreamy atmosphere, cute friendly characters. ';

  const charVisualDesc = char.visualDescription
    ? `Main character ${char.name}: ${char.visualDescription}. `
    : '';

  for (let i = 0; i < total; i++) {
    const page = story.pages[i];
    const prompt = `Warm watercolor children's picture book illustration. ${charVisualDesc}Scene: ${page.illustration}. ${styleStr}No text or letters in image. Age 2-5 children's book.`;

    try {
      const resp = await fetch('https://api.openai.com/v1/images/generations', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getOpenAIKey()}`
        },
        body: JSON.stringify({
          model: 'dall-e-3',
          prompt,
          n: 1,
          size: '1024x1024',
          response_format: 'b64_json'
        })
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);
      const b64 = data.data[0].b64_json;
      const dataUrl = `data:image/png;base64,${b64}`;
      page.imageDataUrl = dataUrl;

      const imgArea = document.getElementById(`page-img-${i}`);
      imgArea.innerHTML = `<img src="${escHtml(dataUrl)}" alt="page ${i+1} illustration">`;
    } catch(e) {
      console.error(`Image gen error page ${i}:`, e);
      const imgArea = document.getElementById(`page-img-${i}`);
      imgArea.innerHTML = `<div class="page-img-placeholder"><span class="emoji">⚠️</span><div style="font-size:12px;color:#e44">${escHtml(e.message)}</div></div>`;
    }
    done++;
    updateProgress(done, total);
  }

  appState.imagesGenerated = true;
  banner.classList.add('hidden');
  document.getElementById('pdf-btn').classList.remove('hidden');
  feedbackSection.style.display = '';

  // Auto-save to library
  await saveToLibrary();
  showToast('라이브러리에 저장됐어요 📚');
}

function updateProgress(done, total) {
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('progress-text').textContent = `그림 생성 중... ${done}/${total}`;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ============================================================
// LIBRARY
// ============================================================
async function saveToLibrary() {
  const story = appState.storyData;
  const char = appState.selectedCharacter;
  if (!story || !char) return;
  const record = {
    title: story.title,
    characterName: char.name,
    characterPhotoDataUrl: char.photoDataUrl || null,
    synopsis: appState.synopsis,
    pages: story.pages.map(p => ({ text: p.text, illustration: p.illustration, imageDataUrl: p.imageDataUrl || null })),
    createdAt: Date.now()
  };
  const id = await dbAdd('library', record);
  record.id = id;
  appState.library.unshift(record);
}

async function loadLibrary() {
  const all = await dbGetAll('library');
  appState.library = all.sort((a,b) => b.createdAt - a.createdAt);
}

function showLibrary() {
  appState.currentView = 'library';
  document.getElementById('main-view').classList.add('hidden');
  document.getElementById('library-view').classList.add('active');
  renderLibrary();
}

function hideLibrary() {
  appState.currentView = 'main';
  document.getElementById('main-view').classList.remove('hidden');
  document.getElementById('library-view').classList.remove('active');
}

function renderLibrary() {
  const listEl = document.getElementById('library-list');
  const lib = appState.library;
  if (lib.length === 0) {
    listEl.innerHTML = `<div class="library-empty">
      <div class="emoji">📚</div>
      <p>아직 저장된 동화가 없어요<br>동화를 완성하면 자동으로 저장돼요!</p>
    </div>`;
    return;
  }
  listEl.innerHTML = lib.map((story, idx) => {
    const firstImg = story.pages && story.pages.find(p => p.imageDataUrl);
    const thumb = firstImg
      ? `<img class="library-thumb" src="${escHtml(firstImg.imageDataUrl)}" alt="thumb">`
      : (story.characterPhotoDataUrl
          ? `<img class="library-thumb" src="${escHtml(story.characterPhotoDataUrl)}" alt="char">`
          : `<div class="library-thumb-emoji">📖</div>`);
    return `<div class="library-card">
      ${thumb}
      <div class="library-info">
        <div class="library-story-title">${escHtml(story.title)}</div>
        <div class="library-meta">👤 ${escHtml(story.characterName)} · ${formatKoreanDate(story.createdAt)}</div>
        <div class="library-actions">
          <button style="background:#e8f4ff;color:#3b82f6;" onclick="downloadLibraryPDF(${idx})">📄 PDF 저장</button>
          <button style="background:#fee;color:#e44;" onclick="deleteLibraryStory(${story.id})">🗑️ 삭제</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function deleteLibraryStory(id) {
  if (!confirm('정말 삭제할까요?')) return;
  await dbDelete('library', id);
  await loadLibrary();
  renderLibrary();
}

async function downloadLibraryPDF(idx) {
  const story = appState.library[idx];
  if (!story) return;
  await generatePDF(story.title, story.characterName, story.characterPhotoDataUrl, story.pages);
}

// ============================================================
// PDF GENERATION
// ============================================================
async function savePDF() {
  const story = appState.storyData;
  const char = appState.selectedCharacter;
  if (!story) return;
  await generatePDF(
    story.title,
    char ? char.name : '',
    char ? char.photoDataUrl : null,
    story.pages
  );
}

async function generatePDF(title, characterName, characterPhotoDataUrl, pages) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: [420, 210] });
  const renderEl = document.getElementById('pdf-render');

  showToast('PDF 생성 중... 잠시만 기다려주세요', 5000);

  try {
    // Cover page
    const coverDiv = document.createElement('div');
    coverDiv.className = 'pdf-cover';
    coverDiv.innerHTML = `
      <div class="pdf-cover-left">
        ${characterPhotoDataUrl
          ? `<img class="pdf-cover-photo" src="${escHtml(characterPhotoDataUrl)}" alt="char">`
          : `<div class="pdf-cover-emoji-big">👤</div>`}
        <div class="pdf-cover-title">${escHtml(title)}</div>
        <div class="pdf-cover-for">for ${escHtml(characterName)}</div>
      </div>
      <div class="pdf-cover-right">📖</div>
    `;
    renderEl.appendChild(coverDiv);
    const coverCanvas = await html2canvas(coverDiv, { scale: 2, useCORS: true, allowTaint: true, width: 840, height: 420 });
    renderEl.removeChild(coverDiv);
    const coverImg = coverCanvas.toDataURL('image/jpeg', 0.92);
    doc.addImage(coverImg, 'JPEG', 0, 0, 420, 210);

    // Story pages
    for (let i = 0; i < pages.length; i++) {
      const page = pages[i];
      const bgColor = PDF_BG_COLORS[i % PDF_BG_COLORS.length];

      doc.addPage();
      const pageDiv = document.createElement('div');
      pageDiv.className = 'pdf-page';
      pageDiv.innerHTML = `
        <div class="pdf-left" style="background:${bgColor};">
          <div class="pdf-page-badge">${i+1}</div>
          <div class="pdf-page-label">PAGE ${i+1}</div>
          <div class="pdf-page-text">${escHtml(page.text)}</div>
        </div>
        <div class="pdf-right">
          ${page.imageDataUrl
            ? `<img src="${escHtml(page.imageDataUrl)}" alt="page">`
            : `<div class="pdf-right-placeholder">${PAGE_EMOJIS[i % PAGE_EMOJIS.length]}</div>`}
        </div>
      `;
      renderEl.appendChild(pageDiv);
      const pageCanvas = await html2canvas(pageDiv, { scale: 2, useCORS: true, allowTaint: true, width: 840, height: 420 });
      renderEl.removeChild(pageDiv);
      const pageImg = pageCanvas.toDataURL('image/jpeg', 0.92);
      doc.addImage(pageImg, 'JPEG', 0, 0, 420, 210);
    }

    const safeTitle = (title || '동화').replace(/[^\wㄱ-힣]/g, '_');
    const safeChar = (characterName || '').replace(/[^\wㄱ-힣]/g, '_');
    doc.save(`${safeChar}의_동화_${safeTitle}.pdf`);
    showToast('PDF가 저장됐어요 📄');
  } catch(e) {
    console.error('PDF error:', e);
    showToast('PDF 생성 실패: ' + e.message);
    // Clean up any leftover render elements
    renderEl.innerHTML = '';
  }
}

// INIT
// ============================================================
async function init() {
  await openDB();
  await loadCharacters();
  await loadStyleRefs();
  await loadLibrary();
  updateApiStatusBadges();
  setStep('input');
  renderCharSelector();
  updateMakeBtn();
}

init().catch(console.error);
</script>

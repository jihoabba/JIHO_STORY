<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지호의 동화책 메이커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FFF9F0 0%, #FFF0F5 50%, #F0F5FF 100%);
      font-family: 'Nunito', 'Apple SD Gothic Neo', sans-serif;
      position: relative;
      overflow-x: hidden;
    }
    textarea:focus, input:focus { outline: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #FFB3C6; border-radius: 3px; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-12px); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #bg-stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      max-width: 560px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header-emoji { font-size: 52px; margin-bottom: 8px; }
    .header h1 {
      font-size: 26px;
      font-weight: 800;
      color: #4A3F5C;
      letter-spacing: -0.02em;
    }
    .header p {
      margin-top: 8px;
      font-size: 14px;
      color: #9B8EAC;
    }

    /* CARDS */
    .card {
      background: rgba(255,255,255,0.85);
      border-radius: 28px;
      padding: 28px 26px;
      box-shadow: 0 8px 40px rgba(180,160,200,0.15);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.4s ease;
    }

    /* FORM */
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #9B8EAC;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .form-input, .form-textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #F0E6FF;
      border-radius: 14px;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      background: #FDFAFF;
      color: #4A3F5C;
      transition: border-color 0.2s;
    }
    .form-textarea {
      font-size: 14px;
      resize: none;
      line-height: 1.7;
      rows: 4;
    }
    .form-input:focus, .form-textarea:focus { border-color: #C4A0D4; }
    .form-group { margin-bottom: 20px; }
    .form-group:last-of-type { margin-bottom: 24px; }

    /* BUTTONS */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #FFB3C6 0%, #C4A0D4 100%);
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 4px 20px rgba(196,160,212,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary:disabled {
      background: #E8E0EE;
      color: #BBA0CC;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-primary:not(:disabled):active { transform: scale(0.97); }

    .btn-revise {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, #B3D9FF 0%, #A0C4FF 100%);
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 800;
      color: #2A5088;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: transform 0.15s;
    }
    .btn-revise:disabled {
      background: #E8E8EE;
      color: #AAAACC;
      cursor: not-allowed;
    }
    .btn-revise:not(:disabled):active { transform: scale(0.97); }

    .btn-finish {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, #FFB3C6 0%, #C4A0D4 100%);
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 4px 16px rgba(196,160,212,0.4);
      transition: transform 0.15s;
    }
    .btn-finish:active { transform: scale(0.97); }

    .btn-reset {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: transparent;
      border: none;
      font-size: 13px;
      color: #BBA0CC;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
    }
    .btn-row { display: flex; gap: 10px; }

    /* LOADING */
    .loading-card {
      background: rgba(255,255,255,0.85);
      border-radius: 28px;
      padding: 48px 26px;
      box-shadow: 0 8px 40px rgba(180,160,200,0.15);
      text-align: center;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.4s ease;
    }
    .loading-emoji {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
      animation: spin 3s linear infinite;
    }
    .loading-title {
      font-size: 17px;
      font-weight: 700;
      color: #4A3F5C;
      margin-bottom: 6px;
    }
    .loading-sub {
      font-size: 13px;
      color: #9B8EAC;
      margin-bottom: 20px;
    }
    .dots { display: flex; gap: 8px; justify-content: center; padding: 8px 0; }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #FFB3C6;
    }
    .dot:nth-child(1) { animation: bounce 1.2s ease-in-out 0s infinite; }
    .dot:nth-child(2) { animation: bounce 1.2s ease-in-out 0.2s infinite; }
    .dot:nth-child(3) { animation: bounce 1.2s ease-in-out 0.4s infinite; }

    /* STORY REVIEW */
    .title-card {
      background: linear-gradient(135deg, #FFE8F5 0%, #E8E0FF 100%);
      border-radius: 28px;
      padding: 24px 26px 20px;
      margin-bottom: 16px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(196,160,212,0.2);
      border: 2px solid rgba(255,255,255,0.8);
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.4s ease;
    }
    .title-card-emoji { font-size: 36px; margin-bottom: 8px; }
    .title-card h2 {
      font-size: 20px;
      font-weight: 800;
      color: #4A3F5C;
    }
    .title-card p {
      margin-top: 6px;
      font-size: 13px;
      color: #9B8EAC;
    }
    .title-card-cloud {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      opacity: 0.18;
      pointer-events: none;
    }

    .pages-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .page-card {
      border-radius: 20px;
      padding: 20px 22px;
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.4s ease;
    }
    .page-card-badge-emoji {
      position: absolute;
      top: 10px; right: 14px;
      font-size: 28px;
      opacity: 0.3;
    }
    .page-card-label {
      font-size: 11px;
      font-weight: 700;
      color: #C4A0B8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .page-card-text {
      line-height: 1.8;
      font-size: 14px;
      color: #4A3F5C;
      font-family: 'Nanum Myeongjo', Georgia, serif;
    }
    .page-card-text.illus {
      font-style: italic;
      opacity: 0.75;
    }

    /* FEEDBACK */
    .feedback-card {
      background: rgba(255,255,255,0.9);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 4px 20px rgba(180,160,200,0.12);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.4s ease;
    }
    .feedback-label {
      font-size: 13px;
      font-weight: 700;
      color: #9B8EAC;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .feedback-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #F0E6FF;
      border-radius: 12px;
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      background: #FDFAFF;
      color: #4A3F5C;
      resize: none;
      line-height: 1.6;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .feedback-textarea:focus { border-color: #C4A0D4; outline: none; }

    /* ERROR */
    .error-msg {
      color: #FF6B8A;
      font-size: 13px;
      margin-bottom: 12px;
      text-align: center;
    }

    /* HIDDEN */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Background Stars -->
<svg id="bg-stars" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice">
  <circle cx="30"  cy="20"  r="2.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="80"  cy="60"  r="1.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="150" cy="15"  r="2.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="220" cy="45"  r="1.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="310" cy="25"  r="2.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="370" cy="70"  r="1.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="50"  cy="120" r="1.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="130" cy="100" r="2.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="200" cy="130" r="1.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="280" cy="90"  r="1.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="350" cy="140" r="2.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="20"  cy="200" r="1.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="90"  cy="180" r="2.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="170" cy="210" r="1.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="250" cy="170" r="1.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="330" cy="200" r="2.5" fill="#FFD580" opacity="0.25"/>
  <circle cx="380" cy="230" r="1.5" fill="#FFD580" opacity="0.25"/>
</svg>

<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-emoji">📚</div>
    <h1>지호의 동화책 메이커</h1>
    <p>세상에 하나뿐인 우리 아이 맞춤 동화 ✨</p>
  </div>

  <!-- STEP: INPUT -->
  <div id="step-input" class="card">
    <div class="form-group">
      <label class="form-label">🌟 주인공 이름</label>
      <input id="child-name" class="form-input" type="text" placeholder="예: 지호" />
    </div>
    <div class="form-group">
      <label class="form-label">📝 이야기 개요</label>
      <textarea id="synopsis" class="form-textarea" rows="4"
        placeholder="예: 지호가 처음으로 혼자 어린이집에 가는 날, 낯선 친구를 만나서 사이좋게 노는 이야기"></textarea>
    </div>
    <p id="error-msg" class="error-msg hidden"></p>
    <button id="btn-generate" class="btn-primary" disabled>동화 만들기 🪄</button>
  </div>

  <!-- STEP: LOADING -->
  <div id="step-loading" class="loading-card hidden">
    <span class="loading-emoji">✨</span>
    <p class="loading-title" id="loading-title">동화를 쓰고 있어요...</p>
    <p class="loading-sub" id="loading-sub">만을 위한 이야기를 만드는 중이에요 🌸</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- STEP: REVIEW -->
  <div id="step-review" class="hidden">

    <!-- Title card -->
    <div class="title-card">
      <svg class="title-card-cloud" viewBox="0 0 200 80">
        <ellipse cx="100" cy="50" rx="90" ry="35" fill="#B5CEFF"/>
        <ellipse cx="60"  cy="45" rx="50" ry="28" fill="#C8D9FF"/>
        <ellipse cx="150" cy="48" rx="45" ry="26" fill="#C8D9FF"/>
        <ellipse cx="100" cy="35" rx="55" ry="30" fill="#D4E3FF"/>
      </svg>
      <div class="title-card-emoji">📖</div>
      <h2 id="story-title">제목</h2>
      <p id="story-meta"></p>
    </div>

    <!-- Pages -->
    <div id="pages-list" class="pages-list"></div>

    <!-- Feedback -->
    <div class="feedback-card">
      <p class="feedback-label">💬 피드백 (선택)</p>
      <textarea id="feedback" class="feedback-textarea" rows="3"
        placeholder="예: 5페이지 내용을 좀 더 재미있게 바꿔줘&#10;예: 결말이 너무 짧아, 좀 더 따뜻하게 마무리해줘"></textarea>
      <div class="btn-row">
        <button id="btn-revise" class="btn-revise" disabled>✏️ 수정하기</button>
        <button id="btn-finish" class="btn-finish">🎉 완성하기</button>
      </div>
      <button id="btn-reset" class="btn-reset">← 처음부터 다시 만들기</button>
    </div>
  </div>

</div>

<script>
  // ── State ──────────────────────────────────────────────
  let state = {
    childName: "",
    synopsis: "",
    feedback: "",
    storyData: null,   // { title, pages: [{text, illustration}] }
    step: "input",     // input | loading | review
  };

  // ── DOM refs ───────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const stepInput   = $("step-input");
  const stepLoading = $("step-loading");
  const stepReview  = $("step-review");
  const inputName   = $("child-name");
  const inputSynop  = $("synopsis");
  const inputFeedback = $("feedback");
  const btnGenerate = $("btn-generate");
  const btnRevise   = $("btn-revise");
  const btnFinish   = $("btn-finish");
  const btnReset    = $("btn-reset");
  const errorMsg    = $("error-msg");
  const pagesList   = $("pages-list");

  // ── Page colors / emojis ───────────────────────────────
  const PAGE_COLORS = ["#FFE8F0","#E8F4FF","#FFF3E0","#E8FFE8","#F3E8FF","#FFF8E0","#E0F8FF"];
  const PAGE_EMOJIS = ["🌸","⭐","🌈","🍀","🌙","🌻","🦋"];

  // ── UI helpers ─────────────────────────────────────────
  function showStep(name) {
    stepInput.classList.toggle("hidden",   name !== "input");
    stepLoading.classList.toggle("hidden", name !== "loading");
    stepReview.classList.toggle("hidden",  name !== "review");
    state.step = name;
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.remove("hidden");
  }
  function clearError() {
    errorMsg.textContent = "";
    errorMsg.classList.add("hidden");
  }

  function updateGenerateBtn() {
    btnGenerate.disabled = !(inputName.value.trim() && inputSynop.value.trim());
  }

  function updateReviseBtn() {
    btnRevise.disabled = !inputFeedback.value.trim();
  }

  function renderPages(storyData) {
    pagesList.innerHTML = "";
    storyData.pages.forEach((page, i) => {
      // Text card
      const textCard = makePageCard(
        `📖 ${i + 1}페이지`,
        page.text,
        i,
        false
      );
      pagesList.appendChild(textCard);

      // Illustration card
      const illusCard = makePageCard(
        "🎨 삽화 설명",
        `[삽화] ${page.illustration}`,
        i,
        true
      );
      pagesList.appendChild(illusCard);
    });
  }

  function makePageCard(label, text, colorIdx, isIllus) {
    const card = document.createElement("div");
    card.className = "page-card";
    card.style.background = PAGE_COLORS[colorIdx % PAGE_COLORS.length];

    const badge = document.createElement("div");
    badge.className = "page-card-badge-emoji";
    badge.textContent = PAGE_EMOJIS[colorIdx % PAGE_EMOJIS.length];

    const labelEl = document.createElement("div");
    labelEl.className = "page-card-label";
    labelEl.textContent = label;

    const textEl = document.createElement("p");
    textEl.className = "page-card-text" + (isIllus ? " illus" : "");
    textEl.textContent = text;

    card.appendChild(badge);
    card.appendChild(labelEl);
    card.appendChild(textEl);
    return card;
  }

  // ── API call ───────────────────────────────────────────
  const SYSTEM_PROMPT = `당신은 어린이 동화 작가입니다. '추피' 시리즈처럼 2~5세 아이를 위한 따뜻하고 일상적인 동화를 씁니다.

스타일 가이드:
- 일상적인 소재(밥 먹기, 잠자기, 친구 사귀기 등)를 친근하게 표현
- 문장은 짧고 리드미컬하게 (한 문장에 15자 내외)
- 주인공 이름을 자주 불러서 몰입감 형성
- 무겁지 않되 작은 메시지 하나가 담길 것
- 각 페이지는 2~4문장 분량

반드시 아래 JSON 형식으로만 응답하세요. 마크다운 코드블록 없이 순수 JSON만:
{
  "title": "동화 제목",
  "pages": [
    {"text": "1페이지 본문 (2~4문장)", "illustration": "삽화 설명 (한 문장)"},
    {"text": "2페이지 본문", "illustration": "삽화 설명"},
    {"text": "3페이지 본문", "illustration": "삽화 설명"},
    {"text": "4페이지 본문", "illustration": "삽화 설명"},
    {"text": "5페이지 본문", "illustration": "삽화 설명"},
    {"text": "6페이지 본문", "illustration": "삽화 설명"},
    {"text": "7페이지 본문 (마무리)", "illustration": "삽화 설명"}
  ]
}`;

  async function callClaude(userPrompt) {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        system: SYSTEM_PROMPT,
        messages: [{ role: "user", content: userPrompt }],
      }),
    });
    const data = await resp.json();
    const raw = data.content?.[0]?.text || "";
    const clean = raw.replace(/```json|```/g, "").trim();
    return JSON.parse(clean);
  }

  async function generateStory(isRevision) {
    clearError();
    state.childName = inputName.value.trim();
    state.synopsis  = inputSynop.value.trim();

    $("loading-title").textContent = isRevision ? "동화를 다듬고 있어요..." : "동화를 쓰고 있어요...";
    $("loading-sub").textContent   = `${state.childName}만을 위한 이야기를 만드는 중이에요 🌸`;
    showStep("loading");

    const userPrompt = isRevision
      ? `아이 이름: ${state.childName}\n원래 줄거리 개요: ${state.synopsis}\n\n생성된 동화:\n${JSON.stringify(state.storyData, null, 2)}\n\n피드백: ${state.feedback}\n\n위 피드백을 반영해서 동화를 다시 써주세요.`
      : `아이 이름: ${state.childName}\n줄거리 개요: ${state.synopsis}\n\n위 아이 이름과 개요를 바탕으로 동화를 만들어주세요.`;

    try {
      const parsed = await callClaude(userPrompt);
      state.storyData = parsed;

      $("story-title").textContent = parsed.title;
      $("story-meta").textContent  = `${state.childName}를 위한 동화 • 7페이지`;
      renderPages(parsed);

      inputFeedback.value = "";
      state.feedback = "";
      updateReviseBtn();
      showStep("review");
    } catch (e) {
      showError("동화 생성 중 오류가 발생했어요. 다시 시도해주세요.");
      showStep("input");
    }
  }

  // ── Event listeners ────────────────────────────────────
  inputName.addEventListener("input",  updateGenerateBtn);
  inputSynop.addEventListener("input", updateGenerateBtn);
  inputFeedback.addEventListener("input", () => {
    state.feedback = inputFeedback.value;
    updateReviseBtn();
  });

  btnGenerate.addEventListener("click", () => generateStory(false));
  btnRevise.addEventListener("click",   () => generateStory(true));

  btnFinish.addEventListener("click", () => {
    alert(`"${state.storyData?.title}" 동화가 완성되었어요! 🎉\nPDF 저장 기능은 곧 추가될 예정이에요.`);
  });

  btnReset.addEventListener("click", () => {
    inputName.value    = "";
    inputSynop.value   = "";
    inputFeedback.value = "";
